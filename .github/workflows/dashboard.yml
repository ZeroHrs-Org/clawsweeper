name: ClawSweeper Live Dashboard

on:
  workflow_dispatch:
    inputs:
      deployment:
        description: "Dashboard deployment target"
        required: true
        default: zerohrs
        type: choice
        options:
          - zerohrs
          - openclaw
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "scripts/dashboard-refresh-ci.mjs"
      - "scripts/dashboard-smoke.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/dashboard-ci.yml"
      - ".github/workflows/dashboard.yml"

permissions:
  contents: read

concurrency:
  group: clawsweeper-live-dashboard-${{ inputs.deployment || (github.repository_owner == 'ZeroHrs-Org' && 'zerohrs' || 'openclaw') }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy dashboard Worker
    runs-on: ubuntu-latest
    env:
      DASHBOARD_DEPLOYMENT: ${{ inputs.deployment || (github.repository_owner == 'ZeroHrs-Org' && 'zerohrs' || 'openclaw') }}
      OPENCLAW_CLOUDFLARE_ACCOUNT_ID: 91b59577e757131d68d55a471fe32aca
      OPENCLAW_CLOUDFLARE_WORKERS_API_TOKEN: ${{ secrets.OPENCLAW_CLOUDFLARE_WORKERS_API_TOKEN || secrets.OPENCLAW_CLOUDFLARE_API_TOKEN }}
      ZEROHRS_CLOUDFLARE_ACCOUNT_ID: ${{ vars.ZEROHRS_CLOUDFLARE_ACCOUNT_ID || secrets.ZEROHRS_CLOUDFLARE_ACCOUNT_ID }}
      ZEROHRS_CLOUDFLARE_WORKERS_API_TOKEN: ${{ secrets.ZEROHRS_CLOUDFLARE_WORKERS_API_TOKEN }}
      ZEROHRS_CLAWSWEEPER_STATUS_URL: ${{ vars.ZEROHRS_CLAWSWEEPER_STATUS_URL || 'https://clawsweeper.zerohrs.com' }}
      CLAWSWEEPER_STATUS_INGEST_TOKEN: ${{ secrets.CLAWSWEEPER_STATUS_INGEST_TOKEN }}
      CLAWSWEEPER_APP_PRIVATE_KEY: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
      CLAWSWEEPER_WEBHOOK_SECRET: ${{ secrets.CLAWSWEEPER_WEBHOOK_SECRET }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-pnpm

      - name: Resolve deploy config
        id: deploy-config
        run: |
          set -euo pipefail
          case "$DASHBOARD_DEPLOYMENT" in
            zerohrs)
              config="dashboard/wrangler.zerohrs.toml"
              account_id="${ZEROHRS_CLOUDFLARE_ACCOUNT_ID:-}"
              api_token="${ZEROHRS_CLOUDFLARE_WORKERS_API_TOKEN:-}"
              worker_name="zerohrs-clawsweeper-status"
              status_url="${ZEROHRS_CLAWSWEEPER_STATUS_URL:-https://clawsweeper.zerohrs.com}"
              ;;
            openclaw)
              config="dashboard/wrangler.toml"
              account_id="${OPENCLAW_CLOUDFLARE_ACCOUNT_ID:-}"
              api_token="${OPENCLAW_CLOUDFLARE_WORKERS_API_TOKEN:-}"
              worker_name="clawsweeper-status"
              status_url="https://clawsweeper.openclaw.ai"
              ;;
            *)
              echo "Unknown dashboard deployment: $DASHBOARD_DEPLOYMENT" >&2
              exit 1
              ;;
          esac
          test -f "$config"
          {
            echo "DASHBOARD_WRANGLER_CONFIG=$config"
            echo "CLOUDFLARE_ACCOUNT_ID=$account_id"
            echo "CLOUDFLARE_API_TOKEN=$api_token"
            echo "CF_API_TOKEN=$api_token"
            echo "CLOUDFLARE_WORKER_NAME=$worker_name"
            echo "CLAWSWEEPER_STATUS_URL=$status_url"
          } >> "$GITHUB_ENV"
          {
            echo "config=$config"
            echo "worker_name=$worker_name"
            echo "status_url=$status_url"
          } >> "$GITHUB_OUTPUT"

      - name: Verify Cloudflare token is configured
        run: test -n "$CLOUDFLARE_API_TOKEN"

      - name: Prepare deploy config
        id: dashboard-config
        run: |
          test -n "$CLAWSWEEPER_STATUS_INGEST_TOKEN"
          cp "$DASHBOARD_WRANGLER_CONFIG" dashboard/wrangler.deploy.toml
          printf 'INGEST_TOKEN = "%s"\n' "$CLAWSWEEPER_STATUS_INGEST_TOKEN" >> dashboard/wrangler.deploy.toml
          echo "config=dashboard/wrangler.deploy.toml" >> "$GITHUB_OUTPUT"

      - name: Sync Worker secrets
        run: |
          set -euo pipefail
          test -n "$CLAWSWEEPER_APP_PRIVATE_KEY"
          test -n "$CLAWSWEEPER_WEBHOOK_SECRET"
          secrets_file="$RUNNER_TEMP/clawsweeper-worker-secrets.json"
          response_file="$RUNNER_TEMP/clawsweeper-worker-secrets-response.json"
          trap 'rm -f "$secrets_file" "$response_file"' EXIT
          node -e '
            const fs = require("node:fs");
            const names = ["CLAWSWEEPER_APP_PRIVATE_KEY", "CLAWSWEEPER_WEBHOOK_SECRET"];
            const secrets = Object.fromEntries(
              names.map((name) => {
                const text = process.env[name] || "";
                if (!text) process.exit(2);
                return [name, { name, text, type: "secret_text" }];
              }),
            );
            fs.writeFileSync(process.argv[1], JSON.stringify({ secrets }));
          ' "$secrets_file"
          http_status="$(
            curl --silent --show-error \
              --output "$response_file" \
              --write-out "%{http_code}" \
              --request PATCH \
              --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              --header "Content-Type: application/merge-patch+json" \
              --data-binary @"$secrets_file" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$CLOUDFLARE_WORKER_NAME/secrets-bulk"
          )"
          if [[ "$http_status" != 2* ]] || ! jq -e '.success == true' "$response_file" >/dev/null; then
            echo "Cloudflare secret sync failed with HTTP $http_status" >&2
            jq '{errors, messages}' "$response_file" >&2 || true
            exit 1
          fi

      - name: Deploy Worker
        run: npx wrangler@4.90.0 deploy --config "${{ steps.dashboard-config.outputs.config }}"

      - name: Smoke test live dashboard
        run: pnpm run dashboard:smoke -- "$CLAWSWEEPER_STATUS_URL"
