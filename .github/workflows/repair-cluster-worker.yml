name: repair cluster worker

run-name: ${{ contains(inputs.job, '/inbox/issue-') && format('issue implementation {0}', inputs.job) || contains(inputs.job, '/inbox/automerge-') && format('automerge repair {0}', inputs.job) || format('repair cluster {0}', inputs.job) }}

on:
  workflow_dispatch:
    inputs:
      job:
        description: "Job markdown path, for example jobs/openclaw/inbox/cluster-001.md"
        required: true
        type: string
      mode:
        description: "Worker mode"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - execute
          - autonomous
      runner:
        description: "Runner label for cluster planning/review work"
        required: true
        default: blacksmith-4vcpu-ubuntu-2404
        type: string
      execution_runner:
        description: "Runner label for fix/apply execution work"
        required: true
        default: blacksmith-16vcpu-ubuntu-2404
        type: string
      planner_sandbox:
        description: "Codex planning sandbox; danger-full-access is for trusted ephemeral runner fallback only"
        required: true
        default: read-only
        type: choice
        options:
          - read-only
          - danger-full-access
      model:
        description: "Codex model"
        required: true
        default: gpt-5.4-mini
        type: string
      dry_run:
        description: "Render prompt and write a dry result without invoking Codex"
        required: true
        default: false
        type: boolean
      requeue:
        description: "Run in a dedicated lane while replacing a stale-head worker"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLAWSWEEPER_APP_CLIENT_ID: Iv23lio8I2FpfNvoKSKg
  CLAWSWEEPER_APP_PRIVATE_KEY_PRESENT: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY != '' && '1' || '0' }}
  ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN: ${{ secrets.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN }}
  CLAWSWEEPER_MODEL: ${{ secrets.CLAWSWEEPER_MODEL || vars.CLAWSWEEPER_MODEL || 'gpt-5.4-mini' }}
  CLAWSWEEPER_STATUS_URL: ${{ vars.CLAWSWEEPER_STATUS_URL || vars.ZEROHRS_CLAWSWEEPER_STATUS_URL || (github.repository_owner == 'ZeroHrs-Org' && 'https://clawsweeper.zerohrs.com' || 'https://clawsweeper.openclaw.ai') }}
  CLAWSWEEPER_STATUS_INGEST_URL: ${{ vars.CLAWSWEEPER_STATUS_INGEST_URL || (github.repository_owner == 'ZeroHrs-Org' && 'https://clawsweeper.zerohrs.com/api/events' || 'https://clawsweeper.openclaw.ai/api/events') }}

concurrency:
  group: ${{ inputs.requeue && format('clawsweeper-repair-requeue-{0}-{1}', inputs.job, github.run_id) || format('clawsweeper-repair-{0}', inputs.job) }}
  # Keep an active execute run alive so its temporary gate cleanup can finish;
  # GitHub still coalesces pending runs in this group to the newest dispatch.
  cancel-in-progress: false

jobs:
  cluster:
    name: Plan and review cluster
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 90
    outputs:
      allow_execute: ${{ steps.capture_gates.outputs.allow_execute }}
      allow_fix_pr: ${{ steps.capture_gates.outputs.allow_fix_pr }}
      allow_merge: ${{ steps.capture_gates.outputs.allow_merge }}
      job_exists: ${{ steps.check_job.outputs.job_exists }}
    env:
      CLAWSWEEPER_ALLOWED_OWNER: ${{ vars.CLAWSWEEPER_ALLOWED_OWNER || 'openclaw' }}
      CLAWSWEEPER_ALLOW_EXECUTE: ${{ (inputs.mode == 'execute' || inputs.mode == 'autonomous') && vars.CLAWSWEEPER_ALLOW_EXECUTE == '1' && '1' || '0' }}
      CLAWSWEEPER_ALLOW_FIX_PR: ${{ (inputs.mode == 'execute' || inputs.mode == 'autonomous') && vars.CLAWSWEEPER_ALLOW_FIX_PR == '1' && '1' || '0' }}
      CLAWSWEEPER_ALLOW_MERGE: ${{ (inputs.mode == 'execute' || inputs.mode == 'autonomous') && (vars.CLAWSWEEPER_ALLOW_MERGE || '0') || '0' }}
      CLAWSWEEPER_HYDRATE_CLUSTER_REFS: ${{ vars.CLAWSWEEPER_HYDRATE_CLUSTER_REFS || '1' }}
      CLAWSWEEPER_HYDRATE_COMMENTS: ${{ vars.CLAWSWEEPER_HYDRATE_COMMENTS || '1' }}
      CLAWSWEEPER_MAX_COMMENTS_PER_ITEM: ${{ vars.CLAWSWEEPER_MAX_COMMENTS_PER_ITEM || '30' }}
      CLAWSWEEPER_MAX_LINKED_REFS: ${{ vars.CLAWSWEEPER_MAX_LINKED_REFS || '20' }}
      CLAWSWEEPER_MAX_REVIEW_COMMENTS_PER_PR: ${{ vars.CLAWSWEEPER_MAX_REVIEW_COMMENTS_PER_PR || '50' }}
      CLAWSWEEPER_CODEX_TIMEOUT_MS: ${{ vars.CLAWSWEEPER_CODEX_TIMEOUT_MS || '1800000' }}
      CLAWSWEEPER_CODEX_REASONING_EFFORT: ${{ vars.CLAWSWEEPER_CODEX_REASONING_EFFORT || 'high' }}
      CLAWSWEEPER_CODEX_PLANNER_SANDBOX: ${{ inputs.planner_sandbox }}
      CLAWSWEEPER_STEERABLE_CODEX: ${{ vars.CLAWSWEEPER_STEERABLE_CODEX || '0' }}
      CLAWSWEEPER_CRABFLEET_URL: ${{ vars.CLAWSWEEPER_CRABFLEET_URL || vars.ZEROHRS_CRABFLEET_URL || (github.repository_owner != 'ZeroHrs-Org' && 'https://crabfleet.openclaw.ai' || '') }}
      OPENCLAW_LOCAL_CHECK: "0"
    steps:
      - uses: actions/checkout@v5
        with:
          filter: blob:none

      - name: Resolve target owner
        id: target
        env:
          JOB_PATH: ${{ inputs.job }}
        run: |
          set -euo pipefail
          case "$JOB_PATH" in
            jobs/*/*) ;;
            *)
              echo "Invalid job path: $JOB_PATH" >&2
              exit 1
              ;;
          esac
          owner="${JOB_PATH#jobs/}"
          owner="${owner%%/*}"
          if ! printf '%s' "$owner" | grep -Eq '^[A-Za-z0-9_.-]+$'; then
            echo "Invalid target owner: $owner" >&2
            exit 1
          fi
          echo "target_owner=$owner" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        id: app_token
        if: ${{ env.CLAWSWEEPER_APP_PRIVATE_KEY_PRESENT == '1' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.target_owner }}
          permission-contents: read
          permission-issues: read
          permission-pull-requests: read

      - name: Create target status token
        id: status_token
        if: ${{ env.CLAWSWEEPER_APP_PRIVATE_KEY_PRESENT == '1' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.target_owner }}
          permission-issues: write

      - name: Create state token
        id: state-token
        uses: ./.github/actions/create-state-token
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          fallback-token: ${{ env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-state
        with:
          token: ${{ steps.state-token.outputs.token }}
          fetch-depth: 1
          sparse-checkout: jobs

      - name: Check job file
        id: check_job
        env:
          JOB_PATH: ${{ inputs.job }}
        run: scripts/restore-repair-job.sh "$JOB_PATH" "this worker"

      - name: Capture execution gates
        id: capture_gates
        run: |
          {
            echo "allow_execute=${CLAWSWEEPER_ALLOW_EXECUTE}"
            echo "allow_fix_pr=${CLAWSWEEPER_ALLOW_FIX_PR}"
            echo "allow_merge=${CLAWSWEEPER_ALLOW_MERGE}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve Codex session cache
        id: codex_session
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' }}
        env:
          JOB_PATH: ${{ inputs.job }}
        run: |
          set -euo pipefail
          key="$(printf '%s' "$JOB_PATH" | sha256sum | cut -d' ' -f1)"
          codex_home="$HOME/.clawsweeper-repair/codex-home/work-$key"
          echo "key=$key" >> "$GITHUB_OUTPUT"
          echo "codex_home=$codex_home" >> "$GITHUB_OUTPUT"
          echo "CLAWSWEEPER_CODEX_THREAD_STATE=$codex_home/clawsweeper-thread-state.json" >> "$GITHUB_ENV"

      - uses: ./.github/actions/setup-pnpm
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        with:
          build-script: build:repair

      - name: Resolve ZeroHrs Android planning proof target
        id: zerohrs_review_proof_target
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          JOB_PATH: ${{ inputs.job }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE' > "$RUNNER_TEMP/zerohrs-review-proof-target.env"
          import { parseJob } from "./dist/repair/lib.js";

          const job = parseJob(process.env.JOB_PATH);
          const frontmatter = job.frontmatter ?? {};
          const repo = String(frontmatter.repo ?? frontmatter.source_issue_repo ?? "").trim();
          const normalizedRepo = repo.toLowerCase();
          const sourceIssueNumber = Number(frontmatter.source_issue_number);
          const fallbackRef = Array.isArray(frontmatter.canonical) ? frontmatter.canonical[0] : "";
          const fallbackIssueNumber = Number(String(fallbackRef ?? "").replace(/^#/, ""));
          const itemNumber = Number.isInteger(sourceIssueNumber) && sourceIssueNumber > 0
            ? sourceIssueNumber
            : fallbackIssueNumber;
          const [owner, name] = repo.split("/");
          const shouldRun = normalizedRepo === "zerohrs-org/zerohrs-app" && Number.isInteger(itemNumber) && itemNumber > 0;
          const output = {
            should_run: shouldRun ? "1" : "0",
            target_repo: repo,
            target_repo_owner: owner ?? "",
            target_repo_name: name ?? "",
            item_number: shouldRun ? String(itemNumber) : "",
            target_checkout_dir: "zerohrs-review-target",
          };
          for (const [key, value] of Object.entries(output)) {
            console.log(`${key}=${String(value).replaceAll("\n", " ")}`);
          }
          NODE
          cat "$RUNNER_TEMP/zerohrs-review-proof-target.env" >> "$GITHUB_OUTPUT"

      - name: Create ZeroHrs Android planning proof token
        id: zerohrs_review_proof_token
        if: ${{ steps.zerohrs_review_proof_target.outputs.should_run == '1' && env.CLAWSWEEPER_APP_PRIVATE_KEY_PRESENT == '1' }}
        continue-on-error: true
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.zerohrs_review_proof_target.outputs.target_repo_owner }}
          repositories: ${{ steps.zerohrs_review_proof_target.outputs.target_repo_name }}
          permission-contents: write
          permission-issues: write

      - uses: ./.github/actions/setup-codex
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          CODEX_AUTH_JSON_B64: ${{ secrets.CODEX_AUTH_JSON_B64 }}
          CLAWSWEEPER_INTERNAL_MODEL: ${{ inputs.model || env.CLAWSWEEPER_MODEL }}
        with:
          auth-mode: auth-json
          codex-home: ${{ steps.codex_session.outputs.codex_home }}

      - name: Checkout ZeroHrs target for Android planning proof
        if: ${{ steps.zerohrs_review_proof_target.outputs.should_run == '1' }}
        uses: actions/checkout@v5
        with:
          repository: ${{ steps.zerohrs_review_proof_target.outputs.target_repo }}
          ref: main
          path: ${{ steps.zerohrs_review_proof_target.outputs.target_checkout_dir }}
          fetch-depth: 1
          token: ${{ steps.zerohrs_review_proof_token.outputs.token || steps.app_token.outputs.token || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN || github.token }}

      - name: Prepare ZeroHrs Crabbox proof environment
        if: ${{ steps.check_job.outputs.job_exists == '1' && contains(inputs.job, 'zerohrs-app') }}
        env:
          CRABBOX_VERSION: ${{ vars.CLAWSWEEPER_CRABBOX_VERSION || '0.33.0' }}
          HETZNER_IPV4: ${{ secrets.HETZNER_IPV4 }}
          HETZNER_IPV6: ${{ secrets.HETZNER_IPV6 }}
          ZEROHRS_CRABBOX_STATIC_HOST: ${{ secrets.ZEROHRS_CRABBOX_STATIC_HOST }}
          ZEROHRS_HETZNER_CRABBOX_PRIVATE_KEY: ${{ secrets.ZEROHRS_HETZNER_CRABBOX_PRIVATE_KEY }}
          ZEROHRS_HETZNER_KNOWN_HOSTS: ${{ secrets.ZEROHRS_HETZNER_KNOWN_HOSTS }}
          ZEROHRS_TEST_EMAIL: ${{ secrets.ZEROHRS_TEST_EMAIL }}
          ZEROHRS_TEST_PASSWORD: ${{ secrets.ZEROHRS_TEST_PASSWORD }}
          ZEROHRS_ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.ZEROHRS_ANDROID_GOOGLE_SERVICES_JSON_B64 }}
        run: |
          set -euo pipefail

          write_env() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              {
                echo "${name}<<__ZEROHRS_ENV__"
                printf '%s\n' "$value"
                echo "__ZEROHRS_ENV__"
              } >> "$GITHUB_ENV"
            fi
          }

          mkdir -p "$HOME/.local/bin" "$HOME/.ssh" "$RUNNER_TEMP/zerohrs-crabbox"
          chmod 700 "$HOME/.ssh" "$RUNNER_TEMP/zerohrs-crabbox"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          proof_host="${ZEROHRS_CRABBOX_STATIC_HOST:-${HETZNER_IPV6:-${HETZNER_IPV4:-}}}"

          write_env HETZNER_IPV4 "${HETZNER_IPV4:-}"
          write_env HETZNER_IPV6 "${HETZNER_IPV6:-}"
          write_env CRABBOX_STATIC_HOST "$proof_host"
          write_env ZEROHRS_TEST_EMAIL "${ZEROHRS_TEST_EMAIL:-}"
          write_env ZEROHRS_TEST_PASSWORD "${ZEROHRS_TEST_PASSWORD:-}"
          write_env ZEROHRS_ANDROID_GOOGLE_SERVICES_JSON_B64 "${ZEROHRS_ANDROID_GOOGLE_SERVICES_JSON_B64:-}"

          if [ -n "${ZEROHRS_HETZNER_CRABBOX_PRIVATE_KEY:-}" ]; then
            key_path="$RUNNER_TEMP/zerohrs-crabbox/crabbox_hetzner_ed25519"
            printf '%s\n' "$ZEROHRS_HETZNER_CRABBOX_PRIVATE_KEY" > "$key_path"
            chmod 600 "$key_path"
            write_env CRABBOX_SSH_KEY "$key_path"
          else
            echo "::warning::ZEROHRS_HETZNER_CRABBOX_PRIVATE_KEY is not configured; ZeroHrs Android proof commands will report a missing runner key."
          fi

          if [ -n "${ZEROHRS_HETZNER_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$ZEROHRS_HETZNER_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          elif [ -n "$proof_host" ]; then
            ssh-keyscan -T 15 -t ecdsa,ed25519,rsa "$proof_host" > "$HOME/.ssh/known_hosts" 2>/dev/null
          else
            echo "::warning::ZeroHrs Crabbox static host is not configured; ZeroHrs Android proof commands will report a missing runner host."
          fi
          if [ -f "$HOME/.ssh/known_hosts" ]; then
            chmod 600 "$HOME/.ssh/known_hosts"
          fi

          if ! command -v crabbox >/dev/null 2>&1; then
            tmpdir="$(mktemp -d)"
            archive="crabbox_${CRABBOX_VERSION}_linux_amd64.tar.gz"
            curl -fsSL "https://github.com/openclaw/crabbox/releases/download/v${CRABBOX_VERSION}/${archive}" -o "$tmpdir/crabbox.tar.gz"
            tar -xzf "$tmpdir/crabbox.tar.gz" -C "$tmpdir"
            crabbox_bin="$(find "$tmpdir" -type f -name crabbox -perm -111 | head -n 1)"
            if [ -z "$crabbox_bin" ]; then
              echo "Unable to find crabbox binary in release archive." >&2
              exit 1
            fi
            install -m 0755 "$crabbox_bin" "$HOME/.local/bin/crabbox"
            rm -rf "$tmpdir"
          fi

      - name: Run ZeroHrs Android issue planning evidence
        if: ${{ steps.zerohrs_review_proof_target.outputs.should_run == '1' }}
        id: zerohrs_planning_android_proof
        continue-on-error: true
        timeout-minutes: 75
        env:
          GH_TOKEN: ${{ steps.zerohrs_review_proof_token.outputs.token || steps.app_token.outputs.token || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN || github.token }}
          TARGET_REPO: ${{ steps.zerohrs_review_proof_target.outputs.target_repo }}
          TARGET_DIR: ${{ steps.zerohrs_review_proof_target.outputs.target_checkout_dir }}
          ITEM_NUMBER: ${{ steps.zerohrs_review_proof_target.outputs.item_number }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          target_abs="$GITHUB_WORKSPACE/$TARGET_DIR"
          proof_dir="$target_abs/reports/crabbox-android"
          mkdir -p "$proof_dir"

          write_proof_prompt_env() {
            {
              echo "ZEROHRS_ANDROID_PROOF_PROMPT<<EOF"
              echo "ZeroHrs Android Crabbox review evidence was run before this planning review for $TARGET_REPO#$ITEM_NUMBER."
              echo "Inspect these target checkout artifacts before deciding: reports/crabbox-android/proof-manifest.json, command.log, emulator.log, app.log, before-loading.png, before.mp4, and before.png."
              echo "Mention the ClawSweeper workflow artifact named zerohrs-android-planning-proof-${{ github.run_id }}-${{ github.run_attempt }} and run URL $RUN_URL in the evidence or plan when relevant."
              echo "Planning/review evidence is current-state reproduction evidence only; there is no after-fix proof yet. The plan/review comment must include or link the current-state Android screenshot(s) and MP4 recording(s) captured after manually navigating the real app UI. Do not treat Android launcher, generic start-page screenshots, product proof routes, proof-route env flags, or tests whose only purpose is proof navigation as sufficient. If the app opens on the billing gate and the report is about Plans/pricing, use the visible Compare Plans entrypoint and capture that sheet/screen instead of retrying Account-tab fallback coordinates. If the captured media does not show the issue-specific route or visible reported state, mark proof blocked in the plan/review and name the exact manual navigation or local seed step needed next."
              echo "For implementation PRs, the executor coding agent must decide the issue-specific reproduction path and capture before evidence from main plus after evidence from the fixed branch under reports/clawsweeper/android-proof. When reproduction needs account, app, billing, referral, entitlement, or plan state, create/use local admin or referral codes, activate local trial/plan state, or seed/mock local dev database rows; document the commands and seeded state instead of using production data."
              echo "EOF"
            } >> "$GITHUB_ENV"
          }

          write_local_proof_manifest() {
            local status="$1"
            local reason="$2"
            cat > "$proof_dir/proof-manifest.json" <<JSON
          {
            "status": "$status",
            "reason": "$reason",
            "run_url": "$RUN_URL",
            "item_number": "$ITEM_NUMBER",
            "artifacts": [
              "proof-manifest.json",
              "command.log",
              "emulator.log",
              "app.log",
              "before-loading.png",
              "before.mp4",
              "before.png"
            ]
          }
          JSON
          }

          ensure_local_proof_artifacts() {
            missing=0
            for artifact in before-loading.png before.png before.mp4; do
              if [ ! -f "$proof_dir/$artifact" ]; then
                missing=1
              fi
            done
            if [ "$missing" = "1" ] && grep -q '"status": "completed"' "$proof_dir/proof-manifest.json" 2>/dev/null; then
              write_local_proof_manifest "failed" "Android proof did not produce required loading screenshot and recording artifacts"
            fi
          }

          annotate_planning_proof_manifest() {
            PROOF_MANIFEST_PATH="$proof_dir/proof-manifest.json" node --input-type=module <<'NODE'
          import fs from "node:fs";

          const manifestPath = process.env.PROOF_MANIFEST_PATH;
          const itemNumber = Number(process.env.ITEM_NUMBER);
          if (!manifestPath || !Number.isInteger(itemNumber) || itemNumber <= 0 || !fs.existsSync(manifestPath)) {
            process.exit(0);
          }
          const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));
          manifest.item_number = itemNumber;
          manifest.issue_number ??= itemNumber;
          manifest.source_issue_url ??= `https://github.com/${process.env.TARGET_REPO}/issues/${itemNumber}`;
          manifest.proof_context ??= "planning_review_current_state";
          fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE
          }

          exclude_android_proof_artifacts() {
            mkdir -p "$target_abs/.git/info"
            {
              echo ".crabbox/runs/"
              echo "reports/crabbox-android/"
            } >> "$target_abs/.git/info/exclude"
          }

          write_proof_prompt_env
          exclude_android_proof_artifacts

          labels="$(gh issue view "$ITEM_NUMBER" --repo "$TARGET_REPO" --json labels --jq '.labels[].name' || true)"
          if ! printf '%s\n' "$labels" | grep -Fxq "feedback"; then
            echo "Skipping Android planning proof because $TARGET_REPO#$ITEM_NUMBER is not labeled feedback."
            exit 0
          fi

          proof_host="${CRABBOX_STATIC_HOST:-${HETZNER_IPV4:-}}"
          if [ -z "${CRABBOX_SSH_KEY:-}" ] || [ -z "$proof_host" ]; then
            printf 'missing Hetzner Android proof secrets\n' > "$proof_dir/command.log"
            printf 'not started\n' > "$proof_dir/emulator.log"
            printf 'not started\n' > "$proof_dir/app.log"
            write_local_proof_manifest "blocked" "missing Hetzner Android proof secrets"
            exit 0
          fi

          (
            cd "$target_abs"
            mkdir -p reports/crabbox-android
            if ! crabbox run \
              --reclaim \
              --provider ssh \
              --target linux \
              --static-host "$proof_host" \
              --static-user crabbox \
              --static-port 22 \
              --static-work-root /work/crabbox \
              --no-hydrate \
              --label "ZeroHrs Android issue planning evidence for #$ITEM_NUMBER" \
              --artifact-glob "reports/crabbox-android/**" \
              --require-artifact "reports/crabbox-android/proof-manifest.json" \
              --require-artifact "reports/crabbox-android/command.log" \
              --require-artifact "reports/crabbox-android/emulator.log" \
              --require-artifact "reports/crabbox-android/app.log" \
              --require-artifact "reports/crabbox-android/before-loading.png" \
              --require-artifact "reports/crabbox-android/before.mp4" \
              --require-artifact "reports/crabbox-android/before.png" \
              --download "reports/crabbox-android/proof-manifest.json=reports/crabbox-android/proof-manifest.json" \
              --download "reports/crabbox-android/command.log=reports/crabbox-android/command.log" \
              --download "reports/crabbox-android/emulator.log=reports/crabbox-android/emulator.log" \
              --download "reports/crabbox-android/app.log=reports/crabbox-android/app.log" \
              --download "reports/crabbox-android/before-loading.png=reports/crabbox-android/before-loading.png" \
              --download "reports/crabbox-android/before.mp4=reports/crabbox-android/before.mp4" \
              --download "reports/crabbox-android/before.png=reports/crabbox-android/before.png" \
              --stop-after never \
              --shell \
              -- \
              "bash scripts/crabbox/android-proof.sh"; then
              echo "::warning::Android Crabbox planning proof failed; planner will inspect the local failure manifest if artifacts were downloaded."
              if [ ! -f reports/crabbox-android/proof-manifest.json ]; then
                write_local_proof_manifest "failed" "crabbox run failed before proof artifacts were downloaded"
                printf 'crabbox run failed before proof artifacts were downloaded\n' > reports/crabbox-android/command.log
                printf 'not downloaded\n' > reports/crabbox-android/emulator.log
                printf 'not downloaded\n' > reports/crabbox-android/app.log
              fi
            fi
            ensure_local_proof_artifacts
          )
          annotate_planning_proof_manifest

      - name: Publish ZeroHrs Android issue planning proof media
        if: ${{ steps.zerohrs_review_proof_target.outputs.should_run == '1' && (steps.zerohrs_review_proof_token.outputs.token != '' || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN != '') }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.zerohrs_review_proof_token.outputs.token || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN || github.token }}
          ZEROHRS_GITHUB_USER_ATTACHMENT_COOKIE: ${{ secrets.ZEROHRS_GITHUB_USER_ATTACHMENT_COOKIE }}
        run: |
          mkdir -p .clawsweeper-repair
          pnpm run repair:zerohrs-android-review-proof -- \
            --proof-root "${{ steps.zerohrs_review_proof_target.outputs.target_checkout_dir }}/reports/crabbox-android" \
            --report .clawsweeper-repair/zerohrs-android-review-proof-report.json

      - name: Upload ZeroHrs Android issue planning proof media
        if: ${{ always() && steps.zerohrs_review_proof_target.outputs.should_run == '1' }}
        uses: actions/upload-artifact@v7
        with:
          name: zerohrs-android-planning-proof-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.zerohrs_review_proof_target.outputs.target_checkout_dir }}/reports/crabbox-android/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Restore Codex session
        id: restore_codex_session
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' }}
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ steps.codex_session.outputs.codex_home }}/sessions
            ${{ steps.codex_session.outputs.codex_home }}/clawsweeper-thread-state.json
          key: ${{ runner.os }}-clawsweeper-codex-thread-${{ steps.codex_session.outputs.key }}-${{ github.run_id }}-${{ github.run_attempt }}-cluster
          restore-keys: |
            ${{ runner.os }}-clawsweeper-codex-thread-${{ steps.codex_session.outputs.key }}-

      - name: Register steerable Action session
        id: crabfleet_session
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' && !inputs.dry_run }}
        env:
          CLAWSWEEPER_CRABFLEET_SERVICE_TOKEN: ${{ secrets.CLAWSWEEPER_CRABFLEET_SERVICE_TOKEN }}
          CLAWSWEEPER_CRABFLEET_OWNER: ${{ vars.CLAWSWEEPER_CRABFLEET_OWNER }}
        run: pnpm run repair:action-session -- register "${{ inputs.job }}"

      - name: Verify GitHub read token
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN || github.token }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "GitHub App token is required"
            exit 1
          fi
          gh auth status

      - name: Validate job
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: pnpm run repair:validate-job -- "${{ inputs.job }}"

      - name: Resolve worker mode
        id: worker_mode
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          JOB_PATH: ${{ inputs.job }}
          REQUESTED_MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          mode="$(
            node --input-type=module <<'NODE'
          import { parseJob, validateJob } from "./dist/repair/lib.js";

          const requested = process.env.REQUESTED_MODE || "plan";
          const job = parseJob(process.env.JOB_PATH);
          const errors = validateJob(job);
          if (errors.length > 0) {
            throw new Error(errors.join("\n"));
          }
          const jobMode = String(job.frontmatter.mode || "");
          const mode = requested === "execute" && jobMode === "autonomous" ? "autonomous" : requested;
          process.stdout.write(mode);
          NODE
          )"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"

      - name: Verify self-heal head
        id: self_heal_head
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN || github.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: pnpm run repair:conflict-self-heal -- --verify-job-head "${{ inputs.job }}"

      - name: Publish automatic implementation planning status
        if: ${{ steps.check_job.outputs.job_exists == '1' && steps.self_heal_head.outputs.matched != 'false' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.status_token.outputs.token || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN || github.token }}
          CLAWSWEEPER_STATUS_INGEST_TOKEN: ${{ secrets.CLAWSWEEPER_STATUS_INGEST_TOKEN }}
        run: |
          pnpm run repair:issue-implementation-status -- \
            --job "${{ inputs.job }}" \
            --state "Planning" \
            --detail "Codex is reading the issue and repository, choosing an implementation, and planning validation." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Run worker
        if: ${{ steps.check_job.outputs.job_exists == '1' && steps.self_heal_head.outputs.matched != 'false' }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN || github.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: |
          worker_mode="${{ steps.worker_mode.outputs.mode }}"
          if [ "$worker_mode" != "plan" ] && [ "${CLAWSWEEPER_ALLOW_EXECUTE}" != "1" ]; then
            echo "CLAWSWEEPER_ALLOW_EXECUTE is not explicitly 1; rendering plan-only output for requested $worker_mode run"
            worker_mode="plan"
          fi
          args=("${{ inputs.job }}" --mode "$worker_mode")
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi
          pnpm run repair:worker -- "${args[@]}"

      - name: Review worker result
        if: always()
        run: |
          if find .clawsweeper-repair/runs -name result.json -print -quit | grep -q .; then
            pnpm run repair:review-results -- .clawsweeper-repair/runs
          fi

      - name: Collect Codex debug logs
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' }}
        env:
          CLAWSWEEPER_CODEX_DEBUG_SINCE_MINUTES: ${{ vars.CLAWSWEEPER_CODEX_DEBUG_SINCE_MINUTES || '240' }}
        run: |
          if [ -f dist/repair/collect-codex-debug.js ]; then
            node dist/repair/collect-codex-debug.js \
              --out .clawsweeper-repair/codex-debug/cluster \
              --label cluster \
              --since-minutes "${CLAWSWEEPER_CODEX_DEBUG_SINCE_MINUTES}"
          else
            echo "::notice title=No Codex debug collector::dist/repair/collect-codex-debug.js is missing."
          fi

      - name: Upload Codex debug logs
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' }}
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-codex-debug-cluster-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/codex-debug/cluster/**
          if-no-files-found: warn
          retention-days: 7

      - name: Upload worker transfer artifacts
        if: ${{ always() && (inputs.mode == 'execute' || inputs.mode == 'autonomous') && !inputs.dry_run }}
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-worker-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/runs
          if-no-files-found: warn

      - name: Upload final worker artifacts
        if: ${{ always() && (!((inputs.mode == 'execute' || inputs.mode == 'autonomous') && !inputs.dry_run) || failure() || cancelled()) }}
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .clawsweeper-repair/runs/**
          if-no-files-found: warn

      - name: Save Codex session
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ steps.codex_session.outputs.codex_home }}/sessions
            ${{ steps.codex_session.outputs.codex_home }}/clawsweeper-thread-state.json
          key: ${{ runner.os }}-clawsweeper-codex-thread-${{ steps.codex_session.outputs.key }}-${{ github.run_id }}-${{ github.run_attempt }}-cluster

      - name: Record planning completion
        if: ${{ success() && steps.crabfleet_session.outcome == 'success' }}
        run: |
          if [[ "${{ inputs.mode }}" == "plan" || "${{ inputs.dry_run }}" == "true" ]]; then
            pnpm run repair:action-session -- update \
              --state completed \
              --phase "done" \
              --summary "Planning and deterministic review completed" \
              --completion-reason plan_complete
          else
            pnpm run repair:action-session -- update \
              --state running \
              --phase planned \
              --summary "Planning completed; execution runner starting"
          fi

      - name: Record planning failure
        if: ${{ failure() && steps.crabfleet_session.outcome == 'success' }}
        continue-on-error: true
        run: pnpm run repair:action-session -- update --state blocked --phase planning_failed --summary "Planning Action failed" --completion-reason action_failed

  execute:
    name: Execute and apply cluster actions
    needs: cluster
    if: ${{ needs.cluster.result == 'success' && needs.cluster.outputs.job_exists == '1' && (inputs.mode == 'execute' || inputs.mode == 'autonomous') && !inputs.dry_run }}
    runs-on: ${{ inputs.execution_runner }}
    timeout-minutes: 180
    env:
      CLAWSWEEPER_ALLOWED_OWNER: ${{ vars.CLAWSWEEPER_ALLOWED_OWNER || 'openclaw' }}
      CLAWSWEEPER_ALLOW_EXECUTE: ${{ needs.cluster.outputs.allow_execute == '1' && '1' || '0' }}
      CLAWSWEEPER_ALLOW_FIX_PR: ${{ needs.cluster.outputs.allow_fix_pr == '1' && '1' || '0' }}
      CLAWSWEEPER_ALLOW_MERGE: ${{ needs.cluster.outputs.allow_merge || '0' }}
      CLAWSWEEPER_CODEX_REASONING_EFFORT: ${{ vars.CLAWSWEEPER_CODEX_REASONING_EFFORT || 'high' }}
      CLAWSWEEPER_CODEX_REVIEW_ATTEMPTS: ${{ vars.CLAWSWEEPER_CODEX_REVIEW_ATTEMPTS || (github.repository_owner == 'ZeroHrs-Org' && '0' || '4') }}
      CLAWSWEEPER_FIX_CODEX_TIMEOUT_MS: ${{ vars.CLAWSWEEPER_FIX_CODEX_TIMEOUT_MS || '1800000' }}
      CLAWSWEEPER_FIX_STEP_TIMEOUT_MS: "2400000"
      CLAWSWEEPER_FIX_TIMEOUT_RESERVE_MS: ${{ vars.CLAWSWEEPER_FIX_TIMEOUT_RESERVE_MS || '300000' }}
      CLAWSWEEPER_FIX_PREFLIGHT_TIMEOUT_MS: ${{ vars.CLAWSWEEPER_FIX_PREFLIGHT_TIMEOUT_MS || '120000' }}
      CLAWSWEEPER_RESOLVE_REVIEW_THREADS: ${{ vars.CLAWSWEEPER_RESOLVE_REVIEW_THREADS || '1' }}
      CLAWSWEEPER_TARGET_VALIDATION_MODE: ${{ vars.CLAWSWEEPER_TARGET_VALIDATION_MODE || 'changed-only' }}
      CLAWSWEEPER_POST_FLIGHT_IGNORE_CHECKS: ${{ vars.CLAWSWEEPER_POST_FLIGHT_IGNORE_CHECKS || 'auto-response,Labeler,Stale' }}
      CLAWSWEEPER_MAX_ACTIVE_PRS_PER_AREA: ${{ vars.CLAWSWEEPER_MAX_ACTIVE_PRS_PER_AREA || '50' }}
      CLAWSWEEPER_CLOSE_SUPERSEDED_SOURCE_PRS: ${{ vars.CLAWSWEEPER_CLOSE_SUPERSEDED_SOURCE_PRS || '1' }}
      CLAWSWEEPER_GIT_USER_NAME: ${{ vars.CLAWSWEEPER_GIT_USER_NAME || 'clawsweeper[bot]' }}
      CLAWSWEEPER_GIT_USER_EMAIL: ${{ vars.CLAWSWEEPER_GIT_USER_EMAIL || '274271284+clawsweeper[bot]@users.noreply.github.com' }}
      CLAWSWEEPER_STEERABLE_CODEX: ${{ vars.CLAWSWEEPER_STEERABLE_CODEX || '0' }}
      CLAWSWEEPER_CRABFLEET_URL: ${{ vars.CLAWSWEEPER_CRABFLEET_URL || vars.ZEROHRS_CRABFLEET_URL || (github.repository_owner != 'ZeroHrs-Org' && 'https://crabfleet.openclaw.ai' || '') }}
      OPENCLAW_LOCAL_CHECK: "0"
    steps:
      - uses: actions/checkout@v5
        with:
          filter: blob:none

      - name: Resolve target owner
        id: target
        env:
          JOB_PATH: ${{ inputs.job }}
        run: |
          set -euo pipefail
          case "$JOB_PATH" in
            jobs/*/*) ;;
            *)
              echo "Invalid job path: $JOB_PATH" >&2
              exit 1
              ;;
          esac
          owner="${JOB_PATH#jobs/}"
          owner="${owner%%/*}"
          if ! printf '%s' "$owner" | grep -Eq '^[A-Za-z0-9_.-]+$'; then
            echo "Invalid target owner: $owner" >&2
            exit 1
          fi
          echo "target_owner=$owner" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        id: target_write_token
        if: ${{ env.CLAWSWEEPER_APP_PRIVATE_KEY_PRESENT == '1' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.target_owner }}
          permission-actions: write
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write

      - name: Create central requeue token
        id: requeue-token
        if: ${{ env.CLAWSWEEPER_APP_PRIVATE_KEY_PRESENT == '1' }}
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: clawsweeper
          permission-actions: write
          permission-contents: write

      - name: Create state token
        id: state-token
        uses: ./.github/actions/create-state-token
        with:
          client-id: ${{ env.CLAWSWEEPER_APP_CLIENT_ID }}
          private-key: ${{ secrets.CLAWSWEEPER_APP_PRIVATE_KEY }}
          fallback-token: ${{ env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-state
        with:
          token: ${{ steps.state-token.outputs.token }}
          fetch-depth: 1
          sparse-checkout: jobs

      - name: Check job file
        id: check_job
        env:
          JOB_PATH: ${{ inputs.job }}
        run: scripts/restore-repair-job.sh "$JOB_PATH" "execute"

      - name: Resolve Codex session cache
        id: codex_session
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' }}
        env:
          JOB_PATH: ${{ inputs.job }}
        run: |
          set -euo pipefail
          key="$(printf '%s' "$JOB_PATH" | sha256sum | cut -d' ' -f1)"
          codex_home="$HOME/.clawsweeper-repair/codex-home/work-$key"
          echo "key=$key" >> "$GITHUB_OUTPUT"
          echo "codex_home=$codex_home" >> "$GITHUB_OUTPUT"
          echo "CLAWSWEEPER_CODEX_THREAD_STATE=$codex_home/clawsweeper-thread-state.json" >> "$GITHUB_ENV"

      - uses: ./.github/actions/setup-pnpm
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        with:
          build-script: build:repair

      - name: Setup pinned Bun for target validation
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.10

      - uses: ./.github/actions/setup-codex
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          CODEX_AUTH_JSON_B64: ${{ secrets.CODEX_AUTH_JSON_B64 }}
          CLAWSWEEPER_INTERNAL_MODEL: ${{ inputs.model || env.CLAWSWEEPER_MODEL }}
        with:
          auth-mode: auth-json
          cache-suffix: target-pnpm
          codex-home: ${{ steps.codex_session.outputs.codex_home }}

      - name: Prepare ZeroHrs Crabbox proof environment
        if: ${{ steps.check_job.outputs.job_exists == '1' && contains(inputs.job, 'zerohrs-app') }}
        env:
          CRABBOX_VERSION: ${{ vars.CLAWSWEEPER_CRABBOX_VERSION || '0.33.0' }}
          HETZNER_IPV4: ${{ secrets.HETZNER_IPV4 }}
          HETZNER_IPV6: ${{ secrets.HETZNER_IPV6 }}
          ZEROHRS_CRABBOX_STATIC_HOST: ${{ secrets.ZEROHRS_CRABBOX_STATIC_HOST }}
          ZEROHRS_HETZNER_CRABBOX_PRIVATE_KEY: ${{ secrets.ZEROHRS_HETZNER_CRABBOX_PRIVATE_KEY }}
          ZEROHRS_HETZNER_KNOWN_HOSTS: ${{ secrets.ZEROHRS_HETZNER_KNOWN_HOSTS }}
          ZEROHRS_TEST_EMAIL: ${{ secrets.ZEROHRS_TEST_EMAIL }}
          ZEROHRS_TEST_PASSWORD: ${{ secrets.ZEROHRS_TEST_PASSWORD }}
          ZEROHRS_ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.ZEROHRS_ANDROID_GOOGLE_SERVICES_JSON_B64 }}
        run: |
          set -euo pipefail

          write_env() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              {
                echo "${name}<<__ZEROHRS_ENV__"
                printf '%s\n' "$value"
                echo "__ZEROHRS_ENV__"
              } >> "$GITHUB_ENV"
            fi
          }

          mkdir -p "$HOME/.local/bin" "$HOME/.ssh" "$RUNNER_TEMP/zerohrs-crabbox"
          chmod 700 "$HOME/.ssh" "$RUNNER_TEMP/zerohrs-crabbox"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          proof_host="${ZEROHRS_CRABBOX_STATIC_HOST:-${HETZNER_IPV6:-${HETZNER_IPV4:-}}}"

          write_env HETZNER_IPV4 "${HETZNER_IPV4:-}"
          write_env HETZNER_IPV6 "${HETZNER_IPV6:-}"
          write_env CRABBOX_STATIC_HOST "$proof_host"
          write_env ZEROHRS_TEST_EMAIL "${ZEROHRS_TEST_EMAIL:-}"
          write_env ZEROHRS_TEST_PASSWORD "${ZEROHRS_TEST_PASSWORD:-}"
          write_env ZEROHRS_ANDROID_GOOGLE_SERVICES_JSON_B64 "${ZEROHRS_ANDROID_GOOGLE_SERVICES_JSON_B64:-}"

          if [ -n "${ZEROHRS_HETZNER_CRABBOX_PRIVATE_KEY:-}" ]; then
            key_path="$RUNNER_TEMP/zerohrs-crabbox/crabbox_hetzner_ed25519"
            printf '%s\n' "$ZEROHRS_HETZNER_CRABBOX_PRIVATE_KEY" > "$key_path"
            chmod 600 "$key_path"
            write_env CRABBOX_SSH_KEY "$key_path"
          else
            echo "::warning::ZEROHRS_HETZNER_CRABBOX_PRIVATE_KEY is not configured; ZeroHrs Android proof commands will report a missing runner key."
          fi

          if [ -n "${ZEROHRS_HETZNER_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$ZEROHRS_HETZNER_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          elif [ -n "$proof_host" ]; then
            ssh-keyscan -T 15 -t ecdsa,ed25519,rsa "$proof_host" > "$HOME/.ssh/known_hosts" 2>/dev/null
          else
            echo "::warning::ZeroHrs Crabbox static host is not configured; ZeroHrs Android proof commands will report a missing runner host."
          fi
          if [ -f "$HOME/.ssh/known_hosts" ]; then
            chmod 600 "$HOME/.ssh/known_hosts"
          fi

          if ! command -v crabbox >/dev/null 2>&1; then
            tmpdir="$(mktemp -d)"
            archive="crabbox_${CRABBOX_VERSION}_linux_amd64.tar.gz"
            curl -fsSL "https://github.com/openclaw/crabbox/releases/download/v${CRABBOX_VERSION}/${archive}" -o "$tmpdir/crabbox.tar.gz"
            tar -xzf "$tmpdir/crabbox.tar.gz" -C "$tmpdir"
            crabbox_bin="$(find "$tmpdir" -type f -name crabbox -perm -111 | head -n 1)"
            if [ -z "$crabbox_bin" ]; then
              echo "Unable to find crabbox binary in release archive." >&2
              exit 1
            fi
            install -m 0755 "$crabbox_bin" "$HOME/.local/bin/crabbox"
            rm -rf "$tmpdir"
          fi

      - name: Restore Codex session
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' }}
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ steps.codex_session.outputs.codex_home }}/sessions
            ${{ steps.codex_session.outputs.codex_home }}/clawsweeper-thread-state.json
          key: ${{ runner.os }}-clawsweeper-codex-thread-${{ steps.codex_session.outputs.key }}-${{ github.run_id }}-${{ github.run_attempt }}-cluster
          restore-keys: |
            ${{ runner.os }}-clawsweeper-codex-thread-${{ steps.codex_session.outputs.key }}-

      - name: Resume steerable Action session
        id: crabfleet_session
        if: ${{ steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' }}
        env:
          CLAWSWEEPER_CRABFLEET_SERVICE_TOKEN: ${{ secrets.CLAWSWEEPER_CRABFLEET_SERVICE_TOKEN }}
          CLAWSWEEPER_CRABFLEET_OWNER: ${{ vars.CLAWSWEEPER_CRABFLEET_OWNER }}
        run: pnpm run repair:action-session -- register "${{ inputs.job }}"

      - name: Download worker artifacts
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        uses: actions/download-artifact@v8
        with:
          name: clawsweeper-repair-worker-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/runs

      - name: Validate job
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: pnpm run repair:validate-job -- "${{ inputs.job }}"

      - name: Resolve worker mode
        id: worker_mode
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          JOB_PATH: ${{ inputs.job }}
          REQUESTED_MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          mode="$(
            node --input-type=module <<'NODE'
          import { parseJob, validateJob } from "./dist/repair/lib.js";

          const requested = process.env.REQUESTED_MODE || "plan";
          const job = parseJob(process.env.JOB_PATH);
          const errors = validateJob(job);
          if (errors.length > 0) {
            throw new Error(errors.join("\n"));
          }
          const jobMode = String(job.frontmatter.mode || "");
          const mode = requested === "execute" && jobMode === "autonomous" ? "autonomous" : requested;
          process.stdout.write(mode);
          NODE
          )"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"

      - name: Verify self-heal head
        id: self_heal_head
        if: ${{ steps.check_job.outputs.job_exists == '1' }}
        env:
          GH_TOKEN: ${{ steps.target_write_token.outputs.token || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN || github.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: pnpm run repair:conflict-self-heal -- --verify-job-head "${{ inputs.job }}"

      - name: Publish automatic implementation build status
        if: ${{ steps.check_job.outputs.job_exists == '1' && steps.self_heal_head.outputs.matched != 'false' && env.CLAWSWEEPER_ALLOW_EXECUTE == '1' && env.CLAWSWEEPER_ALLOW_FIX_PR == '1' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.target_write_token.outputs.token || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN || github.token }}
          CLAWSWEEPER_STATUS_INGEST_TOKEN: ${{ secrets.CLAWSWEEPER_STATUS_INGEST_TOKEN }}
        run: |
          pnpm run repair:issue-implementation-status -- \
            --job "${{ inputs.job }}" \
            --state "Building" \
            --detail "Codex is editing, validating, and reviewing the implementation before a branch or pull request is published." \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Execute credited fix artifact
        id: execute_fix
        if: ${{ steps.check_job.outputs.job_exists == '1' && steps.self_heal_head.outputs.matched != 'false' && env.CLAWSWEEPER_ALLOW_EXECUTE == '1' && env.CLAWSWEEPER_ALLOW_FIX_PR == '1' }}
        timeout-minutes: 40
        env:
          GH_TOKEN: ${{ steps.target_write_token.outputs.token || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN || github.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
          ZEROHRS_TARGET_ENV_B64: ${{ secrets.ZEROHRS_TARGET_ENV_B64 }}
        run: pnpm run repair:execute-fix -- "${{ inputs.job }}" --latest

      - name: Publish ZeroHrs Android proof media
        id: zerohrs_android_proof
        if: ${{ steps.check_job.outputs.job_exists == '1' && steps.self_heal_head.outputs.matched != 'false' && env.CLAWSWEEPER_ALLOW_EXECUTE == '1' && env.CLAWSWEEPER_ALLOW_FIX_PR == '1' && contains(inputs.job, 'zerohrs-app') }}
        timeout-minutes: 140
        env:
          GH_TOKEN: ${{ steps.target_write_token.outputs.token || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN || github.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
          ZEROHRS_GITHUB_USER_ATTACHMENT_COOKIE: ${{ secrets.ZEROHRS_GITHUB_USER_ATTACHMENT_COOKIE }}
        run: pnpm run repair:zerohrs-android-proof -- "${{ inputs.job }}" --latest

      - name: Recover remote ZeroHrs Android proof media
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' && contains(inputs.job, 'zerohrs-app') }}
        continue-on-error: true
        run: |
          set -euo pipefail

          proof_host="${CRABBOX_STATIC_HOST:-${ZEROHRS_CRABBOX_STATIC_HOST:-${HETZNER_IPV6:-${HETZNER_IPV4:-}}}}"
          static_user="${CRABBOX_STATIC_USER:-crabbox}"
          static_port="${CRABBOX_STATIC_PORT:-22}"
          work_root="${CRABBOX_STATIC_WORK_ROOT:-/work/crabbox}"
          key_path="${CRABBOX_SSH_KEY:-}"
          known_hosts="${HOME}/.ssh/known_hosts"

          if [ -z "$proof_host" ] || [ -z "$key_path" ] || [ ! -f "$key_path" ]; then
            echo "ZeroHrs remote proof recovery skipped; static host or SSH key is unavailable."
            exit 0
          fi

          ssh_opts=(
            -i "$key_path"
            -o IdentitiesOnly=yes
            -o BatchMode=yes
            -o ConnectTimeout=10
            -o ConnectionAttempts=3
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=2
            -p "$static_port"
            -o StrictHostKeyChecking=yes
          )
          if [ -f "$known_hosts" ]; then
            ssh_opts+=(-o "UserKnownHostsFile=$known_hosts")
          fi

          remote_tar="${RUNNER_TEMP}/zerohrs-android-proof-remote.tgz"
          recover_dir=".clawsweeper-repair/runs/remote-zerohrs-android-proof-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}/zerohrs-android-proof/remote"
          rm -f "$remote_tar"
          rm -rf "$recover_dir"
          mkdir -p "$recover_dir"

          if ! ssh "${ssh_opts[@]}" "${static_user}@${proof_host}" bash -s -- "$work_root" >"$remote_tar" <<'REMOTE'
          set -euo pipefail
          work_root="$1"
          proof_dir="$(
            find "$work_root" -path '*/zerohrs-app/reports/clawsweeper/android-proof/command.log' -type f -printf '%T@ %h\n' 2>/dev/null |
              sort -nr |
              head -n 1 |
              cut -d' ' -f2-
          )"
          if [ -z "$proof_dir" ]; then
            exit 2
          fi
          tar -C "$proof_dir" -czf - .
          REMOTE
          then
            echo "ZeroHrs remote proof recovery found no remote proof directory."
            rm -f "$remote_tar"
            exit 0
          fi

          if [ ! -s "$remote_tar" ]; then
            echo "ZeroHrs remote proof recovery produced an empty archive."
            rm -f "$remote_tar"
            exit 0
          fi

          tar -xzf "$remote_tar" -C "$recover_dir"
          echo "Recovered remote ZeroHrs Android proof artifacts:"
          find "$recover_dir" -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Upload ZeroHrs Android proof media
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' && contains(inputs.job, 'zerohrs-app') }}
        uses: actions/upload-artifact@v7
        with:
          name: zerohrs-android-proof-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/runs/**/zerohrs-android-proof/**
          if-no-files-found: warn
          retention-days: 14

      - name: Record deterministic validation phase
        if: ${{ success() && steps.crabfleet_session.outcome == 'success' }}
        run: pnpm run repair:action-session -- update --state running --phase post_flight --summary "Codex changes validated; applying GitHub post-flight gates"

      - name: Apply safe closure actions
        if: ${{ steps.check_job.outputs.job_exists == '1' && steps.self_heal_head.outputs.matched != 'false' && env.CLAWSWEEPER_ALLOW_EXECUTE == '1' }}
        env:
          GH_TOKEN: ${{ steps.target_write_token.outputs.token || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN || github.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: pnpm run repair:apply-result -- "${{ inputs.job }}" --latest

      - name: Post-flight finalize fix PRs
        id: post_flight
        if: ${{ steps.check_job.outputs.job_exists == '1' && steps.self_heal_head.outputs.matched != 'false' && env.CLAWSWEEPER_ALLOW_EXECUTE == '1' && env.CLAWSWEEPER_ALLOW_FIX_PR == '1' }}
        env:
          GH_TOKEN: ${{ steps.target_write_token.outputs.token || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN || github.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: pnpm run repair:post-flight -- "${{ inputs.job }}" --latest

      - name: Apply post-flight closeouts
        if: ${{ steps.check_job.outputs.job_exists == '1' && steps.self_heal_head.outputs.matched != 'false' && env.CLAWSWEEPER_ALLOW_EXECUTE == '1' }}
        env:
          GH_TOKEN: ${{ steps.target_write_token.outputs.token || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN || github.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: pnpm run repair:apply-result -- "${{ inputs.job }}" --latest

      - name: Tag ClawSweeper targets
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' && steps.self_heal_head.outputs.matched != 'false' && env.CLAWSWEEPER_ALLOW_EXECUTE == '1' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.target_write_token.outputs.token || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN || github.token }}
          CLAWSWEEPER_ALLOWED_OWNER: ${{ steps.target.outputs.target_owner }}
        run: pnpm run repair:tag-clawsweeper -- .clawsweeper-repair/runs --apply --live --open-branches false --report .clawsweeper-repair/runs/clawsweeper-label-report.json

      - name: Publish automatic implementation completion status
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.target_write_token.outputs.token || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN || github.token }}
          CLAWSWEEPER_STATUS_INGEST_TOKEN: ${{ secrets.CLAWSWEEPER_STATUS_INGEST_TOKEN }}
          EXECUTE_OUTCOME: ${{ steps.execute_fix.outcome }}
          POST_FLIGHT_OUTCOME: ${{ steps.post_flight.outcome }}
        run: |
          set -euo pipefail
          state="Blocked"
          detail="The automatic implementation worker stopped before all deterministic gates completed. Open the workflow run for the exact blocker."
          pr_url=""
          report=""
          post_flight_report=""
          if [ "$EXECUTE_OUTCOME" = "success" ]; then
            report="$(
              find .clawsweeper-repair/runs -name fix-execution-report.json -type f -print -quit
            )"
            if [ -n "$report" ]; then
              pr_url="$(
                jq -r '
                  [
                    .actions[]?
                    | select(
                        .action == "open_fix_pr" and
                        (.status | IN("opened", "executed", "updated")) and
                        ((.pr_url // "") != "")
                      )
                    | .pr_url
                  ][-1] // empty
                ' "$report"
              )"
            fi
          fi
          if [ "$EXECUTE_OUTCOME" = "success" ] && [ "$POST_FLIGHT_OUTCOME" = "success" ] && [ -n "$report" ]; then
            post_flight_report="${report%/*}/post-flight-report.json"
            if [ ! -f "$post_flight_report" ]; then
              post_flight_report=""
            fi
            if [ -n "$pr_url" ]; then
              state="PR Opened"
              detail="The implementation PR is open. Normal pull request checks and maintainer review continue on $pr_url."
              post_flight_ready="false"
              if [ -n "$post_flight_report" ]; then
                post_flight_ready="$(
                  jq -r --arg pr_url "$pr_url" '
                    any(
                      .actions[]?;
                      .action == "finalize_fix_pr" and
                      .source_action == "open_fix_pr" and
                      .status == "ready" and
                      ((.target // "") == $pr_url)
                    )
                  ' "$post_flight_report"
                )"
              fi
              if [ "$post_flight_ready" = "true" ]; then
                detail="The implementation PR passed the worker's edit, validation, review, publish, and post-flight gates."
              else
                reason="$(
                  jq -r '
                    [
                      .actions[]?
                      | select(.status | IN("blocked", "failed", "skipped"))
                      | .reason
                      | select(type == "string" and length > 0)
                    ][-1] // empty
                  ' "$post_flight_report" 2>/dev/null || true
                )"
                if [ -z "$reason" ]; then
                  reason="$(
                    jq -r '
                      [
                        .actions[]?
                        | select(.status | IN("blocked", "failed", "skipped"))
                        | .reason
                        | select(type == "string" and length > 0)
                      ][-1] // .reason // empty
                    ' "$report"
                  )"
                fi
                if [ -n "$reason" ]; then
                  detail="The implementation PR is open. Post-flight status: $reason"
                fi
              fi
            fi
          fi
          pnpm run repair:issue-implementation-status -- \
            --job "${{ inputs.job }}" \
            --state "$state" \
            --detail "$detail" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --pr-url "$pr_url"

      - name: Detect repair requeue requests
        id: repair_requeue
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' && steps.self_heal_head.outputs.matched != 'false' && env.CLAWSWEEPER_ALLOW_EXECUTE == '1' && env.CLAWSWEEPER_ALLOW_FIX_PR == '1' }}
        run: |
          set -euo pipefail
          count="$(pnpm run --silent workflow -- count-requeue-required --dir .clawsweeper-repair/runs)"
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Requeue source-head repair races
        id: requeue_dispatch
        if: ${{ always() && steps.repair_requeue.outputs.count != '' && steps.repair_requeue.outputs.count != '0' }}
        env:
          GH_TOKEN: ${{ steps.requeue-token.outputs.token || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN || github.token }}
          CLAWSWEEPER_MUTATION_TOKEN_SOURCE: ${{ steps.requeue-token.outputs.token != '' && 'clawsweeper-app' || env.ZEROHRS_CLAWSWEEPER_GITHUB_TOKEN != '' && 'zerohrs-pat-bootstrap' || 'github-token' }}
        run: |
          set -euo pipefail
          echo "Requeueing ${{ steps.repair_requeue.outputs.count }} source-head race repair result(s) against the latest head."
          pnpm run repair:requeue -- "${{ inputs.job }}" \
            --mode "${{ steps.worker_mode.outputs.mode }}" \
            --execute \
            --open-execute-window \
            --wait-for-capacity \
            --runner "${{ inputs.runner }}" \
            --execution-runner "${{ inputs.execution_runner }}" \
            --model "${{ inputs.model }}"

      - name: Record requeued work
        if: ${{ always() && steps.crabfleet_session.outcome == 'success' && steps.repair_requeue.outputs.count != '' && steps.repair_requeue.outputs.count != '0' && steps.requeue_dispatch.outcome == 'success' }}
        run: pnpm run repair:action-session -- update --state running --phase requeued --summary "Source head changed; replacement Action dispatched"

      - name: Record work completion
        if: ${{ success() && steps.crabfleet_session.outcome == 'success' && (steps.repair_requeue.outputs.count == '' || steps.repair_requeue.outputs.count == '0') }}
        run: pnpm run repair:action-session -- update --state completed --phase "done" --summary "Repair, validation, review, push, and post-flight gates completed" --completion-reason gates_passed

      - name: Collect Codex debug logs
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' }}
        env:
          CLAWSWEEPER_CODEX_DEBUG_SINCE_MINUTES: ${{ vars.CLAWSWEEPER_CODEX_DEBUG_SINCE_MINUTES || '240' }}
        run: |
          if [ -f dist/repair/collect-codex-debug.js ]; then
            node dist/repair/collect-codex-debug.js \
              --out .clawsweeper-repair/codex-debug/execute \
              --label execute \
              --since-minutes "${CLAWSWEEPER_CODEX_DEBUG_SINCE_MINUTES}"
          else
            echo "::notice title=No Codex debug collector::dist/repair/collect-codex-debug.js is missing."
          fi

      - name: Upload Codex debug logs
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' }}
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-codex-debug-execute-${{ github.run_id }}-${{ github.run_attempt }}
          path: .clawsweeper-repair/codex-debug/execute/**
          if-no-files-found: warn
          retention-days: 7

      - name: Upload final worker artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clawsweeper-repair-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .clawsweeper-repair/runs/**
          if-no-files-found: warn

      - name: Save Codex session
        if: ${{ always() && steps.check_job.outputs.job_exists == '1' && env.CLAWSWEEPER_STEERABLE_CODEX == '1' }}
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ steps.codex_session.outputs.codex_home }}/sessions
            ${{ steps.codex_session.outputs.codex_home }}/clawsweeper-thread-state.json
          key: ${{ runner.os }}-clawsweeper-codex-thread-${{ steps.codex_session.outputs.key }}-${{ github.run_id }}-${{ github.run_attempt }}-execute

      - name: Record work failure
        if: ${{ always() && failure() && steps.crabfleet_session.outcome == 'success' && (steps.repair_requeue.outputs.count == '' || steps.repair_requeue.outputs.count == '0' || steps.requeue_dispatch.outcome != 'success') }}
        continue-on-error: true
        run: pnpm run repair:action-session -- update --state blocked --phase action_failed --summary "Repair Action failed before all completion gates passed" --completion-reason action_failed
